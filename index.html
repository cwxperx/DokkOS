<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#050606" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="DOKK OS" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>DOKK OS</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell" aria-label="DOKK OS control panel">
      <section class="screen-panel" aria-hidden="true">
        <header class="status-bar">
          <div class="status-left">
            <span>I/O LOCK</span>
            <span class="bars">||||||||</span>
            <span>S 34ms ^</span>
          </div>
          <div class="status-right">
            <span>89%</span>
            <span class="battery">[____}</span>
          </div>
        </header>

        <div class="filter-bar">
          <span>&#49345;&#53468;&#48324; &#51221;&#47148; &#9633;</span>
          <span>&#51600;&#44200;&#52286;&#44592; &#54364;&#49884; &#9633;</span>
          <span>&#49888;&#47280; &#45824;&#49345; &#44048;&#52628;&#44592; &#9633;</span>
        </div>

        <div class="pattern-field"></div>
      </section>

      <aside class="control-panel">
        <div class="debug-readout" aria-hidden="true">
          <span>FPS 23</span>
          <span>GPU 30%</span>
          <span>CPU 91%</span>
          <span>LAT 0ms</span>
        </div>

        <section class="brand-block" aria-label="DOKK OS">
          <img class="logo-art" src="assets/dokk-logo.png" alt="" />
          <h1>DOKK OS</h1>
          <p>dlst 1258</p>
        </section>

        <div class="divider"></div>

        <button class="tool-card inactive" type="button" disabled aria-disabled="true">
          <img class="button-art" src="assets/button-search.png" alt="" />
        </button>

        <button class="tool-card inactive" type="button" disabled aria-disabled="true">
          <img class="button-art" src="assets/button-eye.png" alt="" />
        </button>

        <button class="tool-card hack-card" type="button" id="hackButton" aria-label="Run hack">
          <img class="button-art" src="assets/button-hack.png" alt="" />
        </button>
      </aside>
    </main>

    <div class="rotate-notice" aria-hidden="true">
      <span>TURN PHONE</span>
    </div>

    <section class="video-stage" id="videoStage" aria-hidden="true">
      <button class="exit-hotspot" id="exitVideo" type="button" aria-label="Close video"></button>
      <video id="hackVideo" playsinline preload="auto">
        <source src="assets/logic-bomb.mp4" type="video/mp4" />
      </video>
    </section>

    <script src="script.js"></script>
  </body>
</html>
